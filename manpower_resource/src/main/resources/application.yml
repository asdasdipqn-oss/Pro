server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: hr-management

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://43.139.247.55:3306/manpower_resource?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000
    username: manpower_resource
    password: ckayDzbNmGRHdn6j
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # 连接超时配置（毫秒）
      connect-timeout-millis: 10000
      socket-timeout-millis: 30000

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# 配置文件上传目录
file:
  upload-dir: /tmp/manpower_uploads


  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.edu.ccst.manpower_resource.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 配置
jwt:
  secret: HrManagementSystemSecretKey2024VeryLongAndSecureKeyForJWT
  expiration: 86400000 # 24小时（毫秒）
  header: Authorization
  prefix: Bearer

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: cn.edu.ccst.manpower_resource.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# DeepSeek AI 配置
deepseek:
  api:
    key: sk-3fdcc0061ba14b6d9567fd7d57791c74
    base-url: https://api.deepseek.com/v1

# 日志配置
logging:
  level:
    cn.edu.ccst.manpower_resource: debug
    com.baomidou.mybatisplus: debug
